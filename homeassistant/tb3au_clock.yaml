# Home Assistant package for the tb3au e-ink clock.
#
# This file is TRACKED in the repo so the dashboard action is reproducible.
# It is NOT used by the Pi -- it lives in your Home Assistant config.
#
# Two ways to use it:
#   EASIEST - copy just the `set_clock_message:` block (the part *under*
#            `script:`, not the `script:` line) into your existing `scripts.yaml`.
#            Your configuration.yaml already does `script: !include scripts.yaml`,
#            so nothing else changes. No `homeassistant:` block, no include path.
#   PACKAGE - copy this whole file to /config/homeassistant/tb3au_clock.yaml and
#            add to configuration.yaml:
#              homeassistant:
#                packages:
#                  tb3au_clock: !include homeassistant/tb3au_clock.yaml
#            (this merges with a top-level `script: !include scripts.yaml`).
#
# Then restart/reload HA and add the `Set clock message` script to a dashboard
# as a Button/Tile card. Tapping it prompts for the text and publishes it.
#
# Requires the MQTT integration and the clock daemon (which auto-discovers the
# device via ha_discovery.py). See README.md.
#
# Why a script and not a raw Lovelace button? A Lovelace tap_action that calls
# mqtt.publish with a template in `payload` does NOT render the template
# (HA core issue #137260). A script renders field variables server-side, so
# the JSON template below works.

# A dashboard button: tap it, type a message, and it is sent to the clock.
script:
  set_clock_message:
    alias: "Set clock message"
    mode: restart
    fields:
      text:
        name: Message
        description: Text to show on the e-ink clock
        required: true
        example: "Hello from Home Assistant"
        selector:
          text:
    sequence:
      - service: mqtt.publish
        data:
          topic: tb3au/display/set
          payload: '{"mode":"text","text":"{{ text }}"}'
          qos: 1
          retain: false

# --- Optional: one-tap preset buttons -----------------------------------------
# Duplicate the script with a fixed payload to make preset messages, e.g. a
# "Good morning" button. Add as many as you like and drop them on the dashboard.
