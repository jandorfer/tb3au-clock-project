name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          # The local tests mock waveshare_epd/openai/paho, so only
          # Pillow + requests + pytest + coverage are needed. requirements.txt
          # pins old versions for the Pi's runtime; CI uses current releases.
          pip install -r requirements-dev.txt

      - name: Run pytest with coverage gate
        run: pytest --cov=tb3au --cov-report=term-missing --cov-fail-under=60

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pre-commit
        run: python -m pip install pre-commit

      - name: Run pre-commit hooks
        run: pre-commit run --all-files
